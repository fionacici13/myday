<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>一日一记 · 我的工作本本</title>
    <!-- 引入 xlsx 用于解析 Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(145deg, #fdf0f6 0%, #f9e6f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            font-size: 16px;
            padding: 16px;
        }
        .login-container {
            max-width: 400px;
            width: 100%;
            background-color: rgba(255, 250, 245, 0.95);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            box-shadow: 0 25px 40px -12px rgba(189,130,150,0.35);
            padding: 40px 30px;
            border: 2px solid #ffeef4;
            text-align: center;
        }
        .login-container h1 { font-size: 32px; color: #a6527a; margin-bottom: 8px; }
        .login-container p { color: #b5809b; margin-bottom: 24px; }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block; font-size: 16px; color: #9e6b7e;
            margin-bottom: 4px; padding-left: 12px;
        }
        .input-group input {
            width: 100%; padding: 12px 20px; font-size: 16px;
            border: 2px solid #ffbed6; border-radius: 40px;
            outline: none;
        }
        .login-btn {
            background: #d9c2ff; border: 2px solid #c7a8ff; color: #4e3b5c;
            padding: 14px 0; border-radius: 60px; font-size: 20px;
            font-weight: 600; box-shadow: 0 5px 0 #ab8fc9;
            cursor: pointer; width: 100%; margin-top: 8px;
            transition: 0.08s;
        }
        .login-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #ab8fc9; }
        .error-message { color: #c64a6b; margin-top: 16px; min-height: 24px; }

        #mainApp { display: none; width: 100%; }
        .container {
            max-width: 1400px; width: 100%; margin: 0 auto;
            background-color: rgba(255, 250, 245, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 36px;
            padding: 24px 20px;
            border: 2px solid #ffeef4;
        }
        /* 页面标题 */
        .app-title {
            font-size: 32px;
            font-weight: 600;
            color: #b26288;
            text-align: center;
            margin-bottom: 16px;
            letter-spacing: 4px;
            text-shadow: 2px 2px 0 #ffd9e8;
        }
        .toolbar {
            display: flex; flex-wrap: wrap; gap: 10px;
            align-items: center; margin-bottom: 20px;
            background: #fff0f8; padding: 12px 20px;
            border-radius: 60px; border: 1px solid #ffdae9;
        }
        .view-switch {
            display: flex; gap: 6px; background: #ffeef4;
            padding: 4px; border-radius: 40px;
        }
        .view-btn {
            border: none; background: transparent; padding: 8px 18px;
            border-radius: 40px; font-size: 16px; font-weight: 500;
            color: #ac708b; cursor: pointer;
        }
        .view-btn.active { background: #ffb6d9; color: white; box-shadow: 0 2px 6px #fba9cd; }
        .date-picker { display: flex; align-items: center; gap: 6px; background: white; padding: 4px 14px; border-radius: 40px; border: 1px solid #ffbed6; }
        .date-picker input, .date-picker select { border: none; background: transparent; font-size: 15px; padding: 6px 2px; outline: none; }
        .btn-export, .btn-import {
            background: #d9c2ff; border: 2px solid #c7a8ff; color: #4e3b5c;
            padding: 8px 20px; border-radius: 40px; font-size: 16px;
            font-weight: 500; box-shadow: 0 4px 0 #ab8fc9;
            cursor: pointer;
        }
        .btn-import { background: #ffe0b5; border-color: #fdc98d; box-shadow: 0 4px 0 #dbaa6b; margin-left: 8px; }
        .btn-export:active, .btn-import:active { transform: translateY(3px); box-shadow: 0 1px 0 currentColor; }

        .view-container { margin-top: 16px; }

        /* 日视图 */
        .day-view { background: #fff9fd; border-radius: 40px; padding: 24px; border: 2px solid #ffd0e2; }
        .day-header { font-size: 24px; font-weight: 500; color: #a6527a; margin-bottom: 20px; }
        .task-list { display: flex; flex-direction: column; gap: 12px; }
        .task-item {
            display: flex; align-items: center; gap: 8px;
            background: white; padding: 10px 16px;
            border-radius: 50px; border: 1.5px solid #ffc9e0;
            flex-wrap: wrap;
        }
        .priority-check {
            appearance: none; -webkit-appearance: none;
            width: 24px; height: 24px; border-radius: 6px;
            border: 2px solid #ccc; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
            background-color: white; transition: 0.1s;
        }
        .priority-check:checked { background-color: currentColor; border-color: currentColor; }
        .priority-check:checked::after { content: "✓"; color: white; font-size: 16px; }
        .priority-check[data-priority="red"] { color: #f44336; border-color: #f44336; }
        .priority-check[data-priority="orange"] { color: #ff9800; border-color: #ff9800; }
        .priority-check[data-priority="green"] { color: #4caf50; border-color: #4caf50; }

        .task-text {
            flex: 2 1 200px; border: none; background: #fff2f8;
            padding: 8px 16px; border-radius: 40px; font-size: 15px;
            border: 1px solid #ffb8d4; outline: none;
        }
        .task-text.completed { text-decoration: line-through; color: #a88b9a; }

        /* 备注图标 */
        .memo-btn {
            background: #fff0d0; border: none; border-radius: 50%;
            width: 36px; height: 36px; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 1px solid #f7c9a4; color: #b2574b;
        }
        .file-icon-btn {
            background: #e8f0fe; border: none; border-radius: 50%;
            width: 36px; height: 36px; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 1px solid #b8cef0; color: #4e6b9e;
        }
        .file-name { font-size: 13px; color: #7a5d6e; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .delete-task {
            background: none; border: none; font-size: 22px;
            cursor: pointer; color: #cc7fa0; width: 36px; height: 36px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .delete-task:hover { background: #ffc2d9; color: white; }
        .add-task-btn {
            background: #ffe2f0; border: 2px dashed #ffa5c4;
            padding: 12px; border-radius: 60px; font-size: 18px;
            color: #b35f86; width: 100%; cursor: pointer; margin-top: 16px;
        }

        /* 月视图网格 */
        .month-view { background: #fff9fd; border-radius: 40px; padding: 24px; border: 2px solid #ffd0e2; }
        .month-header { font-size: 24px; font-weight: 500; color: #a6527a; margin-bottom: 16px; }
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 6px; background: #ffeef4; padding: 12px; border-radius: 32px;
        }
        .weekday {
            text-align: center; font-weight: 600; color: #a6527a;
            padding: 8px 0; font-size: 14px;
        }
        .calendar-cell {
            background: white; border-radius: 18px; padding: 6px 3px;
            min-height: 85px; border: 1px solid #ffc9e0;
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; transition: 0.1s;
            font-size: 12px;
        }
        .calendar-cell:hover { background: #fff0fa; transform: scale(1.02); }
        .cell-date { font-weight: 600; color: #9e6b7e; margin-bottom: 2px; font-size: 14px; }
        .task-dots {
            display: flex; flex-wrap: wrap; gap: 3px; justify-content: center;
            margin: 3px 0;
        }
        .task-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .task-dot.red { background: #f44336; }
        .task-dot.orange { background: #ff9800; }
        .task-dot.green { background: #4caf50; }
        .task-dot.completed { background: #ccc; }

        /* 月视图任务文字 */
        .task-preview {
            font-size: 10px;
            line-height: 1.2;
            color: #5f3f4c;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin: 2px 0;
            padding: 0 2px;
            width: 100%;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .task-preview span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: calc(100% - 16px);
        }
        .has-memo { color: #d46b8c; font-size: 10px; margin-left: 2px; }

        /* 年视图小日历 (保持不变，不显示文字) */
        .year-view { display: flex; flex-direction: column; gap: 24px; }
        .year-month-block {
            background: #fff9fd; border-radius: 40px; padding: 20px;
            border: 2px solid #ffd0e2;
        }
        .year-month-title { font-size: 22px; font-weight: 500; color: #a6527a; margin-bottom: 12px; }
        .month-mini-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 2px; background: #ffeef4; padding: 8px; border-radius: 24px;
        }
        .mini-weekday {
            text-align: center; font-size: 12px; font-weight: 600;
            color: #a6527a; padding: 4px 0;
        }
        .mini-cell {
            background: white; border-radius: 12px; padding: 4px 1px;
            border: 1px solid #ffd0e2; display: flex;
            flex-direction: column; align-items: center;
            cursor: pointer; font-size: 11px;
        }
        .mini-cell .date-num { font-weight: 600; color: #7a4d63; }
        .mini-dots { display: flex; gap: 2px; justify-content: center; flex-wrap: wrap; }
        .mini-dot { width: 5px; height: 5px; border-radius: 50%; }
        .mini-dot.red { background: #f44336; }
        .mini-dot.orange { background: #ff9800; }
        .mini-dot.green { background: #4caf50; }
        .mini-dot.completed { background: #ccc; }

        /* 导出弹窗 */
        .export-dialog, .import-dialog {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3); display: flex;
            justify-content: center; align-items: center;
            z-index: 100;
        }
        .export-card, .import-card {
            background: #fff5fb; border-radius: 60px; padding: 32px;
            max-width: 400px; width: 90%; border: 3px solid #ffbad2;
        }
        .export-card h3, .import-card h3 { font-size: 24px; color: #a6527a; margin-bottom: 20px; }
        .export-card input, .import-card input[type="file"] {
            width: 100%; padding: 12px 20px; font-size: 16px;
            border: 2px solid #ffbed6; border-radius: 50px; margin-bottom: 16px;
        }
        .import-card .format-hint {
            font-size: 13px; color: #a15c7c; margin: 10px 0; text-align: left;
            background: #fff0f5; padding: 10px; border-radius: 20px;
        }
        .export-actions {
            display: flex; gap: 12px; justify-content: flex-end;
        }
        .export-actions button {
            border: none; padding: 10px 22px; border-radius: 40px;
            font-size: 18px; font-weight: 500; cursor: pointer;
        }
        .btn-confirm { background: #d9c2ff; border: 2px solid #c7a8ff; color: #4e3b5c; }
        .btn-cancel { background: #ffe2e2; border: 2px solid #ffb0b0; color: #a15c5c; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div id="loginPage" class="login-container">
        <h1>🔐 一日一记</h1>
        <p>请输入用户名和密码</p>
        <div class="input-group"><label>用户名</label><input type="text" id="username" value="fionacici"></div>
        <div class="input-group"><label>密码</label><input type="password" id="password" value="123456cyl"></div>
        <button class="login-btn" id="loginBtn">登录</button>
        <div class="error-message" id="loginError"></div>
    </div>

    <!-- 主应用 -->
    <div id="mainApp">
        <div class="container">
            <div class="app-title">📔 一日一记</div>
            <div class="toolbar">
                <div class="view-switch">
                    <button class="view-btn active" data-view="day">📅 日</button>
                    <button class="view-btn" data-view="month">📆 月</button>
                    <button class="view-btn" data-view="year">🗓️ 年</button>
                </div>
                <div class="date-picker" id="datePickerContainer"></div>
                <button class="btn-export" id="exportBtn">📤 导出Word</button>
                <button class="btn-import" id="importBtn">📂 导入任务</button>
            </div>
            <div class="view-container" id="viewContainer"></div>
        </div>
    </div>

    <!-- 导出弹窗 -->
    <div id="exportDialog" class="export-dialog hidden">
        <div class="export-card">
            <h3>📎 选择时间段</h3>
            <input type="date" id="exportStart"><input type="date" id="exportEnd">
            <div class="export-actions">
                <button class="btn-cancel" id="cancelExport">取消</button>
                <button class="btn-confirm" id="confirmExport">导出</button>
            </div>
        </div>
    </div>

    <!-- 导入弹窗 -->
    <div id="importDialog" class="import-dialog hidden">
        <div class="import-card">
            <h3>📂 上传文件导入任务</h3>
            <input type="file" id="importFile" accept=".csv,.xlsx,.xls">
            <div class="format-hint">
                <strong>格式说明：</strong><br>
                支持 .csv 或 .xlsx 文件，需包含以下列（可调整顺序，但列名需一致）：<br>
                <code>日期,任务,备注,优先级,完成状态</code><br>
                日期格式：YYYY-MM-DD，优先级：green/orange/red，完成状态：true/false 或 1/0。<br>
                如不填写，默认优先级 green，完成状态 false。
            </div>
            <div class="export-actions">
                <button class="btn-cancel" id="cancelImport">取消</button>
                <button class="btn-confirm" id="confirmImport">导入</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 登录验证 ----------
            const VALID_USERNAME = 'fionacici';
            const VALID_PASSWORD = '123456cyl';
            const loginPage = document.getElementById('loginPage');
            const mainApp = document.getElementById('mainApp');
            const loginBtn = document.getElementById('loginBtn');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const loginError = document.getElementById('loginError');

            function doLogin() {
                if (usernameInput.value.trim() === VALID_USERNAME && passwordInput.value === VALID_PASSWORD) {
                    loginPage.style.display = 'none';
                    mainApp.style.display = 'block';
                    loginError.textContent = '';
                } else {
                    loginError.textContent = '用户名或密码错误';
                    passwordInput.value = '';
                }
            }
            loginBtn.addEventListener('click', doLogin);
            passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); doLogin(); } });

            // ---------- 工作记录核心 ----------
            const STORAGE_KEY = 'mom_work_grid_v3';
            let records = {}; // { "2025-03-21": [{ text: "写周报", completed: false, priority: "green", file: null, memo: "" }, ...] }
            let currentView = 'day';
            let currentDate = new Date();

            // 加载数据
            function loadRecords() {
                try {
                    const stored = localStorage.getItem(STORAGE_KEY);
                    if (stored) records = JSON.parse(stored); else records = {};
                } catch (e) { records = {}; }
                Object.keys(records).forEach(k => { if (!Array.isArray(records[k])) records[k] = []; });
            }
            function saveRecords() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); } catch (e) { alert('保存失败'); } }

            // 获取某天任务
            function getTasks(dateStr) { if (!records[dateStr]) records[dateStr] = []; return records[dateStr]; }

            // 添加空任务（默认优先级绿色）
            function addEmptyTask(dateStr) {
                const tasks = getTasks(dateStr);
                tasks.push({ text: '', completed: false, priority: 'green', file: null, memo: '' });
                saveRecords(); renderView();
            }

            // 更新任务字段（局部更新，不重新渲染整个视图，用于文本输入）
            function updateTaskField(dateStr, index, field, value) {
                const tasks = getTasks(dateStr);
                if (tasks[index]) {
                    tasks[index][field] = value;
                    saveRecords();
                }
            }

            // 更新整个任务对象（触发重绘）
            function updateTask(dateStr, index, updates) {
                const tasks = getTasks(dateStr);
                if (tasks[index]) Object.assign(tasks[index], updates);
                saveRecords(); renderView();
            }

            // 删除任务
            function deleteTask(dateStr, index) {
                const tasks = getTasks(dateStr);
                tasks.splice(index, 1);
                saveRecords(); renderView();
            }

            // 循环切换优先级
            function cyclePriority(current) {
                const order = ['green', 'orange', 'red'];
                let idx = order.indexOf(current);
                if (idx === -1) return 'green';
                return order[(idx + 1) % order.length];
            }

            // 文件选择处理
            function attachFileToTask(dateStr, index) {
                const input = document.createElement('input');
                input.type = 'file';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        updateTask(dateStr, index, { file: { name: file.name, lastModified: file.lastModified } });
                    }
                };
                input.click();
            }

            // 备注处理
            function editMemo(dateStr, index) {
                const tasks = getTasks(dateStr);
                const task = tasks[index];
                if (!task) return;
                const newMemo = prompt('请输入备注（工作要求等）：', task.memo || '');
                if (newMemo !== null) {
                    updateTaskField(dateStr, index, 'memo', newMemo);
                    // 备注更新后，可局部更新月视图，但为了简单，重绘当前视图（因为月视图需要显示备注标记）
                    renderView();
                }
            }

            // 格式化日期
            function formatDate(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            // 获取星期几（中文）
            function getWeekday(date) {
                const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                return weekdays[date.getDay()];
            }

            // 获取某月天数
            function getDaysInMonth(year, month) { return new Date(year, month + 1, 0).getDate(); }

            // 渲染视图
            function renderView() {
                const container = document.getElementById('viewContainer');
                const pickerContainer = document.getElementById('datePickerContainer');
                if (currentView === 'day') { renderDayPicker(pickerContainer); renderDay(container); }
                else if (currentView === 'month') { renderMonthPicker(pickerContainer); renderMonth(container); }
                else if (currentView === 'year') { renderYearPicker(pickerContainer); renderYear(container); }
            }

            // 日视图日期选择器
            function renderDayPicker(container) {
                container.innerHTML = `<input type="date" value="${formatDate(currentDate)}" id="dayPicker">`;
                document.getElementById('dayPicker').addEventListener('change', (e) => {
                    currentDate = new Date(e.target.value + 'T12:00:00');
                    renderView();
                });
            }

            // 日视图渲染
            function renderDay(container) {
                const dateStr = formatDate(currentDate);
                const tasks = getTasks(dateStr);
                let html = `<div class="day-view"><div class="day-header">📌 ${dateStr} ${getWeekday(currentDate)}</div><div class="task-list" data-date="${dateStr}">`;
                tasks.forEach((task, idx) => {
                    const checked = task.completed ? 'checked' : '';
                    html += `
                        <div class="task-item" data-idx="${idx}">
                            <input type="checkbox" class="priority-check" data-priority="${task.priority}" ${checked} style="accent-color: ${task.priority};">
                            <input type="text" class="task-text ${task.completed ? 'completed' : ''}" value="${escapeHtml(task.text || '')}" placeholder="工作内容" data-idx="${idx}">
                            <button class="memo-btn" data-action="memo" data-idx="${idx}" title="备注">📝</button>
                            <button class="file-icon-btn" data-action="file" data-idx="${idx}" title="添加附件">📎</button>
                            ${task.file ? `<span class="file-name">${escapeHtml(task.file.name)}</span>` : ''}
                            <button class="delete-task" data-action="delete" data-idx="${idx}" title="删除">🗑️</button>
                        </div>
                    `;
                });
                html += `</div><button class="add-task-btn" data-action="add">➕ 添加任务</button></div>`;
                container.innerHTML = html;

                const view = container.firstElementChild;

                // 文本输入
                view.querySelectorAll('.task-text').forEach(input => {
                    const idx = input.dataset.idx;
                    input.addEventListener('input', (e) => {
                        updateTaskField(dateStr, parseInt(idx), 'text', e.target.value);
                    });
                });

                // 复选框：左键切换完成状态，右键切换优先级
                view.querySelectorAll('.priority-check').forEach(chk => {
                    const idx = chk.closest('.task-item').dataset.idx;
                    chk.addEventListener('change', (e) => {
                        const completed = e.target.checked;
                        updateTaskField(dateStr, parseInt(idx), 'completed', completed);
                        const textInput = e.target.closest('.task-item').querySelector('.task-text');
                        if (completed) textInput.classList.add('completed');
                        else textInput.classList.remove('completed');
                    });
                    chk.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        const tasks = getTasks(dateStr);
                        const task = tasks[parseInt(idx)];
                        if (task) {
                            const newPri = cyclePriority(task.priority);
                            updateTaskField(dateStr, parseInt(idx), 'priority', newPri);
                            e.target.dataset.priority = newPri;
                            e.target.style.color = newPri === 'red' ? '#f44336' : (newPri === 'orange' ? '#ff9800' : '#4caf50');
                        }
                    });
                });

                // 备注按钮
                view.querySelectorAll('[data-action="memo"]').forEach(btn => {
                    const idx = btn.dataset.idx;
                    btn.addEventListener('click', () => editMemo(dateStr, parseInt(idx)));
                });

                // 文件按钮
                view.querySelectorAll('[data-action="file"]').forEach(btn => {
                    const idx = btn.dataset.idx;
                    btn.addEventListener('click', () => attachFileToTask(dateStr, parseInt(idx)));
                });

                // 删除按钮
                view.querySelectorAll('[data-action="delete"]').forEach(btn => {
                    const idx = btn.dataset.idx;
                    btn.addEventListener('click', () => deleteTask(dateStr, parseInt(idx)));
                });

                // 添加任务按钮
                view.querySelector('[data-action="add"]').addEventListener('click', () => addEmptyTask(dateStr));
            }

            // 月视图日期选择器
            function renderMonthPicker(container) {
                const y = currentDate.getFullYear();
                const m = currentDate.getMonth();
                container.innerHTML = `
                    <select id="monthYear">${generateYearOptions(y)}</select>
                    <select id="monthMonth">${generateMonthOptions(m)}</select>
                `;
                document.getElementById('monthYear').addEventListener('change', (e) => {
                    const newY = parseInt(e.target.value);
                    const newM = document.getElementById('monthMonth').value;
                    currentDate = new Date(newY, newM, 1);
                    renderView();
                });
                document.getElementById('monthMonth').addEventListener('change', (e) => {
                    const newM = parseInt(e.target.value);
                    const newY = document.getElementById('monthYear').value;
                    currentDate = new Date(newY, newM, 1);
                    renderView();
                });
            }

            // 月视图日历网格
            function renderMonth(container) {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = getDaysInMonth(year, month);

                let grid = '<div class="month-view"><div class="month-header">' + year + '年' + (month+1) + '月</div>';
                grid += '<div class="calendar-grid">';
                const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
                weekdays.forEach(w => grid += `<div class="weekday">${w}</div>`);

                for (let i = 0; i < firstDay; i++) {
                    grid += '<div class="calendar-cell" style="opacity:0.4"></div>';
                }

                for (let d = 1; d <= daysInMonth; d++) {
                    const date = new Date(year, month, d);
                    const dateStr = formatDate(date);
                    const tasks = getTasks(dateStr);
                    let dotsHtml = '';
                    let previewsHtml = '';
                    tasks.forEach(task => {
                        const priorityClass = task.completed ? 'completed' : task.priority;
                        dotsHtml += `<span class="task-dot ${priorityClass}"></span>`;
                        // 显示任务前10个字
                        const shortText = (task.text || '').substring(0, 10) + ((task.text || '').length > 10 ? '…' : '');
                        if (shortText) {
                            previewsHtml += `<div class="task-preview"><span>${escapeHtml(shortText)}</span>${task.memo ? '<span class="has-memo">📌</span>' : ''}</div>`;
                        }
                    });
                    grid += `<div class="calendar-cell" data-date="${dateStr}">
                        <div class="cell-date">${d}</div>
                        <div class="task-dots">${dotsHtml}</div>
                        ${previewsHtml}
                    </div>`;
                }

                grid += '</div></div>';
                container.innerHTML = grid;

                container.querySelectorAll('.calendar-cell[data-date]').forEach(cell => {
                    cell.addEventListener('click', () => {
                        const dStr = cell.dataset.date;
                        currentDate = new Date(dStr + 'T12:00:00');
                        currentView = 'day';
                        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                        document.querySelector('[data-view="day"]').classList.add('active');
                        renderView();
                    });
                });
            }

            // 年视图日期选择器
            function renderYearPicker(container) {
                const y = currentDate.getFullYear();
                container.innerHTML = `<select id="yearPicker">${generateYearOptions(y, 10)}</select>`;
                document.getElementById('yearPicker').addEventListener('change', (e) => {
                    currentDate = new Date(parseInt(e.target.value), 0, 1);
                    renderView();
                });
            }

            // 年视图小日历（不显示任务文字）
            function renderYear(container) {
                const year = currentDate.getFullYear();
                let html = '<div class="year-view">';
                for (let m = 0; m < 12; m++) {
                    const month = m;
                    const monthName = year + '年' + (month+1) + '月';
                    const firstDay = new Date(year, month, 1).getDay();
                    const daysInMonth = getDaysInMonth(year, month);

                    html += `<div class="year-month-block"><div class="year-month-title">${monthName}</div>`;
                    html += '<div class="month-mini-grid">';
                    ['日','一','二','三','四','五','六'].forEach(w => html += `<div class="mini-weekday">${w}</div>`);
                    for (let i = 0; i < firstDay; i++) html += '<div class="mini-cell" style="opacity:0.2"></div>';
                    for (let d = 1; d <= daysInMonth; d++) {
                        const date = new Date(year, month, d);
                        const dateStr = formatDate(date);
                        const tasks = getTasks(dateStr);
                        let dots = '';
                        tasks.forEach(task => {
                            const priorityClass = task.completed ? 'completed' : task.priority;
                            dots += `<span class="mini-dot ${priorityClass}"></span>`;
                        });
                        html += `<div class="mini-cell" data-date="${dateStr}">
                            <span class="date-num">${d}</span>
                            <div class="mini-dots">${dots}</div>
                        </div>`;
                    }
                    html += '</div></div>';
                }
                html += '</div>';
                container.innerHTML = html;

                container.querySelectorAll('.mini-cell[data-date]').forEach(cell => {
                    cell.addEventListener('click', () => {
                        const dStr = cell.dataset.date;
                        currentDate = new Date(dStr + 'T12:00:00');
                        currentView = 'day';
                        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                        document.querySelector('[data-view="day"]').classList.add('active');
                        renderView();
                    });
                });
            }

            // 辅助函数
            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, m => {
                    if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; if (m === '"') return '&quot;'; return m;
                });
            }
            function generateYearOptions(selected, range = 5) {
                let opts = '';
                for (let y = selected - range; y <= selected + range; y++)
                    opts += `<option value="${y}" ${y===selected?'selected':''}>${y}年</option>`;
                return opts;
            }
            function generateMonthOptions(selected) {
                let opts = '';
                for (let m = 0; m < 12; m++)
                    opts += `<option value="${m}" ${m===selected?'selected':''}>${m+1}月</option>`;
                return opts;
            }

            // 导出Word
            function exportToWord(startStr, endStr) {
                const start = new Date(startStr + 'T00:00');
                const end = new Date(endStr + 'T23:59');
                if (isNaN(start) || isNaN(end) || start > end) { alert('无效日期区间'); return; }
                let dates = [];
                for (let key in records) {
                    if (records[key].length) {
                        const d = new Date(key + 'T12:00');
                        if (d >= start && d <= end) dates.push(key);
                    }
                }
                dates.sort();
                let content = `<html><head><meta charset="UTF-8"><title>工作记录</title><style>body{font-family:Segoe UI; padding:20px;} .date{font-size:18px;font-weight:bold;margin-top:20px;} .task{margin-left:20px;border-left:3px solid #f4b6c2;padding-left:12px;margin-bottom:8px;} .completed{text-decoration:line-through;color:#888;} .memo{color:#d46b8c;font-size:14px;}</style></head><body><h1>工作记录 ${startStr} ~ ${endStr}</h1>`;
                dates.forEach(ds => {
                    const tasks = records[ds];
                    if (!tasks.length) return;
                    content += `<div class="date">📅 ${ds}</div>`;
                    tasks.forEach(t => {
                        content += `<div class="task ${t.completed ? 'completed' : ''}">`;
                        content += `<div>${escapeHtml(t.text) || '(空)'} [${t.priority}]</div>`;
                        if (t.memo) content += `<div class="memo">📝 ${escapeHtml(t.memo)}</div>`;
                        if (t.file) content += `<div>📎 ${escapeHtml(t.file.name)}</div>`;
                        content += `</div>`;
                    });
                });
                content += '</body></html>';
                const blob = new Blob([content], { type: 'application/msword' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `工作记录_${startStr}_${endStr}.doc`;
                link.click();
            }

            // ---------- 导入任务 ----------
            function importFromFile(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = e.target.result;
                    const fileName = file.name;
                    let rows = [];
                    if (fileName.endsWith('.csv')) {
                        rows = parseCSV(data);
                    } else if (fileName.match(/\.xlsx?$/)) {
                        const workbook = XLSX.read(data, { type: 'binary' });
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                    } else {
                        alert('不支持的文件类型，请上传 .csv 或 .xlsx 文件');
                        return;
                    }

                    // 解析行，第一行为表头
                    if (rows.length < 2) { alert('文件无数据'); return; }
                    const headers = rows[0].map(h => String(h).trim());
                    // 期望列：日期,任务,备注,优先级,完成状态
                    const dateIdx = headers.findIndex(h => h.includes('日期'));
                    const taskIdx = headers.findIndex(h => h.includes('任务'));
                    const memoIdx = headers.findIndex(h => h.includes('备注'));
                    const priIdx = headers.findIndex(h => h.includes('优先级'));
                    const compIdx = headers.findIndex(h => h.includes('完成状态'));
                    if (dateIdx === -1 || taskIdx === -1) {
                        alert('缺少必要列：日期、任务');
                        return;
                    }

                    let importedCount = 0;
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row || row.length === 0) continue;
                        const dateStr = row[dateIdx] ? String(row[dateIdx]).trim() : '';
                        if (!dateStr) continue; // 跳过无日期行
                        // 尝试解析日期 YYYY-MM-DD
                        if (!/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
                            console.warn('日期格式无效:', dateStr);
                            continue;
                        }
                        const taskText = row[taskIdx] ? String(row[taskIdx]).trim() : '';
                        const memo = memoIdx !== -1 && row[memoIdx] ? String(row[memoIdx]).trim() : '';
                        let priority = 'green';
                        if (priIdx !== -1 && row[priIdx]) {
                            const p = String(row[priIdx]).trim().toLowerCase();
                            if (p.includes('red') || p.includes('红')) priority = 'red';
                            else if (p.includes('orange') || p.includes('橙')) priority = 'orange';
                        }
                        let completed = false;
                        if (compIdx !== -1 && row[compIdx]) {
                            const c = String(row[compIdx]).trim().toLowerCase();
                            if (c === 'true' || c === '1' || c === '是' || c === '完成') completed = true;
                        }

                        const tasks = getTasks(dateStr);
                        tasks.push({ text: taskText, completed, priority, file: null, memo });
                        importedCount++;
                    }
                    saveRecords();
                    renderView();
                    alert(`成功导入 ${importedCount} 条任务`);
                };
                if (file.name.match(/\.xlsx?$/)) {
                    reader.readAsBinaryString(file);
                } else {
                    reader.readAsText(file, 'UTF-8');
                }
            }

            // 简单CSV解析（按逗号分割，忽略引号）
            function parseCSV(text) {
                const lines = text.split(/\r?\n/);
                return lines.map(line => line.split(',').map(cell => cell.trim()));
            }

            // 初始化
            loadRecords();

            // 视图切换
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentView = e.target.dataset.view;
                    renderView();
                });
            });

            // 导出弹窗
            const exportBtn = document.getElementById('exportBtn');
            const exportDialog = document.getElementById('exportDialog');
            const cancelExport = document.getElementById('cancelExport');
            const confirmExport = document.getElementById('confirmExport');
            const exportStart = document.getElementById('exportStart');
            const exportEnd = document.getElementById('exportEnd');

            exportBtn.addEventListener('click', () => {
                const today = new Date();
                const sevenAgo = new Date(today); sevenAgo.setDate(today.getDate()-7);
                exportStart.value = formatDate(sevenAgo);
                exportEnd.value = formatDate(today);
                exportDialog.classList.remove('hidden');
            });
            cancelExport.addEventListener('click', () => exportDialog.classList.add('hidden'));
            confirmExport.addEventListener('click', () => {
                if (exportStart.value && exportEnd.value) exportToWord(exportStart.value, exportEnd.value);
                exportDialog.classList.add('hidden');
            });
            exportDialog.addEventListener('click', (e) => { if (e.target === exportDialog) exportDialog.classList.add('hidden'); });

            // 导入弹窗
            const importBtn = document.getElementById('importBtn');
            const importDialog = document.getElementById('importDialog');
            const cancelImport = document.getElementById('cancelImport');
            const confirmImport = document.getElementById('confirmImport');
            const importFile = document.getElementById('importFile');

            importBtn.addEventListener('click', () => {
                importFile.value = ''; // 清空
                importDialog.classList.remove('hidden');
            });
            cancelImport.addEventListener('click', () => importDialog.classList.add('hidden'));
            confirmImport.addEventListener('click', () => {
                const file = importFile.files[0];
                if (!file) { alert('请选择文件'); return; }
                importFromFile(file);
                importDialog.classList.add('hidden');
            });
            importDialog.addEventListener('click', (e) => { if (e.target === importDialog) importDialog.classList.add('hidden'); });

            renderView();
        })();
    </script>
</body>
</html>
